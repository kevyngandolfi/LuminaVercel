<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);}
.page{background:#f5f0eb;min-height:600px;border-radius:16px;overflow:hidden;}
.topbar{background:#fff;border-bottom:0.5px solid #e0d9d1;padding:1rem 1.25rem;display:flex;gap:10px;align-items:center;}
.search-wrap{flex:1;position:relative;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:17px;color:#888780;pointer-events:none;}
.search-wrap input{width:100%;border:0.5px solid #d3d1c7;border-radius:8px;padding:9px 12px 9px 36px;font-size:13px;color:var(--color-text-primary);background:#fff;outline:none;font-family:var(--font-sans);}
.search-wrap input:focus{border-color:#c8522a;box-shadow:0 0 0 2px rgba(200,82,42,0.1);}
.search-wrap input::placeholder{color:#b4b2a9;}
.btn-search{background:#c8522a;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;}
.btn-search:hover{background:#b04621;}
.layout{display:grid;grid-template-columns:220px minmax(0,1fr);gap:0;}
.sidebar{background:#fff;border-right:0.5px solid #e0d9d1;padding:1.25rem;display:flex;flex-direction:column;gap:0;}
.filter-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.filter-title{font-size:13px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:6px;}
.filter-title i{font-size:15px;color:#c8522a;}
.btn-clear{background:none;border:none;font-size:11px;color:#c8522a;cursor:pointer;font-family:var(--font-sans);padding:0;}
.btn-clear:hover{text-decoration:underline;}
.filter-group{border-top:0.5px solid #f0ece8;padding:14px 0;}
.filter-group:last-child{border-bottom:0.5px solid #f0ece8;}
.group-label{font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.check-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer;}
.check-item:last-child{margin-bottom:0;}
.check-item input[type=checkbox]{accent-color:#c8522a;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.check-item label{font-size:12px;color:var(--color-text-secondary);cursor:pointer;line-height:1.3;}
.check-item .count{margin-left:auto;font-size:11px;color:#b4b2a9;}
.radio-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer;}
.radio-item:last-child{margin-bottom:0;}
.radio-item input[type=radio]{accent-color:#c8522a;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.radio-item label{font-size:12px;color:var(--color-text-secondary);cursor:pointer;}
.range-wrap{padding:2px 0;}
.range-wrap input[type=range]{width:100%;accent-color:#c8522a;}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:#888780;margin-top:4px;}
.main{padding:1.25rem;}
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.results-info{font-size:12px;color:#888780;}
.results-info span{color:var(--color-text-primary);font-weight:500;}
.sort-wrap{display:flex;align-items:center;gap:6px;}
.sort-wrap label{font-size:12px;color:#888780;}
.sort-wrap select{border:0.5px solid #d3d1c7;border-radius:7px;padding:5px 8px;font-size:12px;color:var(--color-text-primary);background:#fff;font-family:var(--font-sans);cursor:pointer;outline:none;}
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.filter-tag{background:#FAECE7;color:#712B13;font-size:11px;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.filter-tag button{background:none;border:none;cursor:pointer;color:#993C1D;font-size:13px;line-height:1;padding:0;display:flex;}
.articles-grid{display:flex;flex-direction:column;gap:10px;}
.article-card{background:#fff;border:0.5px solid #e0d9d1;border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;}
.article-card:hover{border-color:#c8522a;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.card-title{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.4;flex:1;}
.card-badge{font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.badge-green{background:#EAF3DE;color:#27500A;}
.badge-amber{background:#FAEEDA;color:#633806;}
.badge-gray{background:#F1EFE8;color:#444441;}
.card-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.card-meta span{font-size:11px;color:#888780;display:flex;align-items:center;gap:3px;}
.card-meta i{font-size:13px;}
.card-area{display:inline-flex;align-items:center;font-size:11px;background:#f5f0eb;color:#5f5e5a;padding:3px 9px;border-radius:20px;margin-bottom:8px;}
.card-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.55;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:0.5px solid #f0ece8;}
.card-author{display:flex;align-items:center;gap:6px;}
.mini-avatar{width:22px;height:22px;border-radius:50%;background:#FAECE7;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:#993C1D;}
.card-author-name{font-size:11px;color:#888780;}
.card-stats{display:flex;gap:10px;}
.card-stat{font-size:11px;color:#b4b2a9;display:flex;align-items:center;gap:3px;}
.card-stat i{font-size:13px;}
.no-results{text-align:center;padding:3rem 1rem;color:#b4b2a9;}
.no-results i{font-size:40px;display:block;margin:0 auto 10px;}
.no-results p{font-size:13px;}
</style>

<div class="page">
  <div class="topbar">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="searchInput" placeholder="Buscar por título, autora ou palavra-chave..." oninput="applyFilters()">
    </div>
    <button class="btn-search">Buscar</button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="filter-header">
        <span class="filter-title"><i class="ti ti-adjustments-horizontal" aria-hidden="true"></i> Filtros</span>
        <button class="btn-clear" onclick="clearAll()">Limpar tudo</button>
      </div>

      <div class="filter-group">
        <p class="group-label">Status</p>
        <div class="check-item"><input type="checkbox" id="s1" onchange="applyFilters()"><label for="s1">Em andamento</label><span class="count">12</span></div>
        <div class="check-item"><input type="checkbox" id="s2" onchange="applyFilters()"><label for="s2">Concluída</label><span class="count">34</span></div>
        <div class="check-item"><input type="checkbox" id="s3" onchange="applyFilters()"><label for="s3">Encerrada</label><span class="count">8</span></div>
      </div>

      <div class="filter-group">
        <p class="group-label">Área de atuação</p>
        <div class="check-item"><input type="checkbox" id="a1" onchange="applyFilters()"><label for="a1">Sociologia</label><span class="count">18</span></div>
        <div class="check-item"><input type="checkbox" id="a2" onchange="applyFilters()"><label for="a2">Biologia</label><span class="count">14</span></div>
        <div class="check-item"><input type="checkbox" id="a3" onchange="applyFilters()"><label for="a3">Engenharia</label><span class="count">9</span></div>
        <div class="check-item"><input type="checkbox" id="a4" onchange="applyFilters()"><label for="a4">Medicina</label><span class="count">11</span></div>
        <div class="check-item"><input type="checkbox" id="a5" onchange="applyFilters()"><label for="a5">Física</label><span class="count">6</span></div>
      </div>

      <div class="filter-group">
        <p class="group-label">Suporte financeiro</p>
        <div class="radio-item"><input type="radio" name="fin" id="f0" value="todos" checked onchange="applyFilters()"><label for="f0">Todos</label></div>
        <div class="radio-item"><input type="radio" name="fin" id="f1" value="sim" onchange="applyFilters()"><label for="f1">Com financiamento</label></div>
        <div class="radio-item"><input type="radio" name="fin" id="f2" value="nao" onchange="applyFilters()"><label for="f2">Sem financiamento</label></div>
      </div>

      <div class="filter-group">
        <p class="group-label">Visualizações mínimas</p>
        <div class="range-wrap">
          <input type="range" id="viewsRange" min="0" max="5000" step="100" value="0" oninput="updateRange()">
          <div class="range-labels"><span>0</span><span id="rangeVal">0+</span></div>
        </div>
      </div>

      <div class="filter-group">
        <p class="group-label">Data de publicação</p>
        <div class="radio-item"><input type="radio" name="date" id="d0" value="todos" checked onchange="applyFilters()"><label for="d0">Qualquer data</label></div>
        <div class="radio-item"><input type="radio" name="date" id="d1" value="2025" onchange="applyFilters()"><label for="d1">2025</label></div>
        <div class="radio-item"><input type="radio" name="date" id="d2" value="2024" onchange="applyFilters()"><label for="d2">2024</label></div>
        <div class="radio-item"><input type="radio" name="date" id="d3" value="2023" onchange="applyFilters()"><label for="d3">2023 ou antes</label></div>
      </div>
    </div>

    <div class="main">
      <div class="active-filters" id="activeTags"></div>
      <div class="results-bar">
        <p class="results-info" id="resultsInfo">Exibindo <span id="resCount">6</span> resultados</p>
        <div class="sort-wrap">
          <label for="sortSel">Ordenar por</label>
          <select id="sortSel" onchange="applyFilters()">
            <option value="relevancia">Relevância</option>
            <option value="recente">Mais recentes</option>
            <option value="visualizacoes">Mais visualizados</option>
          </select>
        </div>
      </div>
      <div class="articles-grid" id="grid"></div>
    </div>
  </div>
</div>

<script>
const ALL = [
  {id:1,title:'Representatividade feminina na ciência brasileira',author:'Dra. Ana Costa',initials:'AC',area:'Sociologia',status:'Concluída',badgeClass:'badge-green',fin:'sim',views:3200,year:2025,desc:'Análise da participação de mulheres em cargos de liderança científica no Brasil nas últimas duas décadas, com dados do CNPq e entrevistas regionais.'},
  {id:2,title:'Impacto das mudanças climáticas na biodiversidade da Mata Atlântica',author:'Profa. Carla Duarte',initials:'CD',area:'Biologia',status:'Em andamento',badgeClass:'badge-amber',fin:'sim',views:1850,year:2025,desc:'Estudo longitudinal sobre espécies ameaçadas no bioma Mata Atlântica frente aos cenários de aquecimento global projetados pelo IPCC.'},
  {id:3,title:'Algoritmos de otimização aplicados à engenharia estrutural',author:'Eng. Fernanda Lima',initials:'FL',area:'Engenharia',status:'Concluída',badgeClass:'badge-green',fin:'nao',views:920,year:2024,desc:'Proposta de método híbrido combinando algoritmos genéticos e redes neurais para otimização de estruturas metálicas sob cargas dinâmicas.'},
  {id:4,title:'Detecção precoce de sepse via biomarcadores inflamatórios',author:'Dra. Renata Moura',initials:'RM',area:'Medicina',status:'Em andamento',badgeClass:'badge-amber',fin:'sim',views:4100,year:2024,desc:'Pesquisa clínica multicêntrica sobre painel de biomarcadores para diagnóstico precoce de sepse em UTIs de hospitais públicos brasileiros.'},
  {id:5,title:'Física quântica e computação: perspectivas para o Brasil',author:'Profa. Helena Vaz',initials:'HV',area:'Física',status:'Encerrada',badgeClass:'badge-gray',fin:'nao',views:610,year:2023,desc:'Revisão sistemática sobre o estado da pesquisa em computação quântica no Brasil e os desafios para formação de capital humano na área.'},
  {id:6,title:'Desigualdade de gênero no mercado de trabalho pós-pandemia',author:'Dra. Juliana Ramos',initials:'JR',area:'Sociologia',status:'Concluída',badgeClass:'badge-green',fin:'sim',views:2780,year:2023,desc:'Análise dos dados da PNAD Contínua sobre a recuperação assimétrica de empregos entre homens e mulheres no período 2021-2024.'},
];

function applyFilters(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const checkedStatus = ['s1','s2','s3'].filter(id=>document.getElementById(id).checked).map(id=>document.getElementById(id).nextElementSibling.textContent.trim());
  const checkedAreas = ['a1','a2','a3','a4','a5'].filter(id=>document.getElementById(id).checked).map(id=>document.getElementById(id).nextElementSibling.textContent.trim());
  const fin = document.querySelector('input[name=fin]:checked').value;
  const minViews = parseInt(document.getElementById('viewsRange').value);
  const dateFilter = document.querySelector('input[name=date]:checked').value;

  let results = ALL.filter(a=>{
    if(q && !a.title.toLowerCase().includes(q) && !a.author.toLowerCase().includes(q) && !a.desc.toLowerCase().includes(q)) return false;
    if(checkedStatus.length && !checkedStatus.includes(a.status)) return false;
    if(checkedAreas.length && !checkedAreas.includes(a.area)) return false;
    if(fin==='sim' && a.fin!=='sim') return false;
    if(fin==='nao' && a.fin!=='nao') return false;
    if(a.views < minViews) return false;
    if(dateFilter==='2025' && a.year!==2025) return false;
    if(dateFilter==='2024' && a.year!==2024) return false;
    if(dateFilter==='2023' && a.year>2023) return false;
    return true;
  });

  const sort = document.getElementById('sortSel').value;
  if(sort==='recente') results.sort((a,b)=>b.year-a.year);
  else if(sort==='visualizacoes') results.sort((a,b)=>b.views-a.views);

  renderGrid(results);
  renderTags(checkedStatus, checkedAreas, fin, minViews, dateFilter, q);
  document.getElementById('resCount').textContent = results.length;
}

function renderGrid(list){
  const grid = document.getElementById('grid');
  if(!list.length){
    grid.innerHTML = '<div class="no-results"><i class="ti ti-file-search" aria-hidden="true"></i><p>Nenhum artigo encontrado com os filtros selecionados.</p></div>';
    return;
  }
  grid.innerHTML = list.map(a=>`
    <div class="article-card">
      <div class="card-top">
        <p class="card-title">${a.title}</p>
        <span class="card-badge ${a.badgeClass}">${a.status}</span>
      </div>
      <span class="card-area">${a.area}</span>
      <p class="card-desc">${a.desc}</p>
      <div class="card-footer">
        <div class="card-author">
          <div class="mini-avatar">${a.initials}</div>
          <span class="card-author-name">${a.author}</span>
        </div>
        <div class="card-stats">
          <span class="card-stat"><i class="ti ti-eye" aria-hidden="true"></i>${a.views.toLocaleString('pt-BR')}</span>
          <span class="card-stat"><i class="ti ti-calendar" aria-hidden="true"></i>${a.year}</span>
          ${a.fin==='sim'?'<span class="card-stat"><i class="ti ti-currency-dollar" aria-hidden="true"></i>Financiado</span>':''}
        </div>
      </div>
    </div>`).join('');
}

function renderTags(status, areas, fin, minViews, date, q){
  const tags = [];
  status.forEach(s=>tags.push({label:'Status: '+s, clear:()=>{['s1','s2','s3'].forEach(id=>{if(document.getElementById(id).nextElementSibling.textContent.trim()===s) document.getElementById(id).checked=false;});applyFilters();}}));
  areas.forEach(a=>tags.push({label:'Área: '+a, clear:()=>{['a1','a2','a3','a4','a5'].forEach(id=>{if(document.getElementById(id).nextElementSibling.textContent.trim()===a) document.getElementById(id).checked=false;});applyFilters();}}));
  if(fin==='sim') tags.push({label:'Com financiamento', clear:()=>{document.getElementById('f0').checked=true;applyFilters();}});
  if(fin==='nao') tags.push({label:'Sem financiamento', clear:()=>{document.getElementById('f0').checked=true;applyFilters();}});
  if(minViews>0) tags.push({label:'Mín. '+minViews.toLocaleString('pt-BR')+' views', clear:()=>{document.getElementById('viewsRange').value=0;updateRange();}});
  if(date!=='todos') tags.push({label:'Ano: '+date, clear:()=>{document.getElementById('d0').checked=true;applyFilters();}});
  if(q) tags.push({label:'Busca: "'+q+'"', clear:()=>{document.getElementById('searchInput').value='';applyFilters();}});

  const container = document.getElementById('activeTags');
  container.innerHTML = tags.map((t,i)=>`<span class="filter-tag">${t.label}<button onclick="clearTag(${i})" aria-label="remover filtro"><i class="ti ti-x" style="font-size:12px;"></i></button></span>`).join('');
  window._tags = tags;
}

function clearTag(i){ window._tags[i].clear(); }

function updateRange(){
  const val = parseInt(document.getElementById('viewsRange').value);
  document.getElementById('rangeVal').textContent = val===0 ? '0+' : val.toLocaleString('pt-BR')+'+';
  applyFilters();
}

function clearAll(){
  ['s1','s2','s3','a1','a2','a3','a4','a5'].forEach(id=>document.getElementById(id).checked=false);
  document.getElementById('f0').checked=true;
  document.getElementById('d0').checked=true;
  document.getElementById('viewsRange').value=0;
  document.getElementById('searchInput').value='';
  document.getElementById('rangeVal').textContent='0+';
  applyFilters();
}

applyFilters();
</script>
