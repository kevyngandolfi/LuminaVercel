<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina — Recuperar Senha</title>
  <link rel="icon" type="image/png" href="resources\icons\lumina_icon_L_star_page-0001.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --cream: #F7F3EE; --orange: #E5501E; --black: #181614; --ink: #2B2622; --muted: #7A7168; --line: #DDD7CF; --white: #FFFFFF; --serif: 'Cormorant Garamond', serif; --sans: 'DM Sans', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .form-container { background: var(--white); border: 1px solid var(--line); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 4px 24px rgba(24, 22, 20, 0.02); }
    .form-title { font-family: var(--serif); font-size: 32px; color: var(--black); margin-bottom: 8px; }
    .form-input { width: 100%; font-family: var(--sans); font-size: 14px; background: var(--cream); border: 1px solid var(--line); border-radius: 8px; padding: 12px 16px; margin-block: 24px; outline: none; transition: border-color .2s; }
    .form-input:focus { border-color: var(--orange); background: var(--white); }
    .btn-submit { width: 100%; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 500; background: var(--orange); color: var(--white); border: none; cursor: pointer; transition: background .2s; }
    .btn-submit:hover { background: #B83E16; }
    .back-link { display: inline-block; margin-top: 24px; font-size: 14px; color: var(--muted); text-decoration: none; transition: color .2s; }
    .back-link:hover { color: var(--orange); }
  </style>
</head>
<body>
  <div class="form-container">
    <div style="width: 48px; height: 48px; background: var(--orange); border-radius: 50%; margin: 0 auto 24px; position: relative;">
      <div style="position: absolute; inset: 8px; border: 2px solid var(--white); border-radius: 50%;"></div>
    </div>
    <h1 class="form-title">Esqueceu sua senha?</h1>
    <p style="font-size: 14px; color: var(--muted);">Digite seu e-mail acadêmico e enviaremos um link de recuperação.</p>
    
    <form action="nova-senha.html" method="GET" onsubmit="alert('Link de recuperação enviado para o seu e-mail!');">
      <input type="email" class="form-input" placeholder="seu.email@exemplo.com" required>
      <button type="submit" class="btn-submit">Enviar link</button>
    </form>
    
    <a href="login.html" class="back-link">Voltar para o Login</a>
  </div>
</body>
</html>
