<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Lumina — Administração</title>
  <link rel="icon" type="image/png" href="resources\icons\lumina_icon_L_star_page-0001.jpg" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --cream: #F7F3EE;
      --orange: #E5501E;
      --black: #181614;
      --ink: #2B2622;
      --muted: #7A7168;
      --line: #DDD7CF;
      --white: #FFFFFF;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'DM Sans', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247, 243, 238, .96);
      border-bottom: 1px solid var(--line);
      padding: 0 24px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 500;
      color: var(--black);
      text-decoration: none;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: var(--orange);
      border-radius: 50%;
      position: relative;
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 5px;
      border: 2px solid var(--white);
      border-radius: 50%;
    }

    .dashboard-container {
      max-width: 1000px;
      margin: 48px auto;
      padding: 0 24px;
    }

    .table-wrapper {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th,
    td {
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    th {
      background: var(--cream-dark);
      font-weight: 500;
      color: var(--ink);
    }

    .btn-action {
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      margin-right: 8px;
    }

    .btn-approve {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .btn-reject {
      background: #FFEBEE;
      color: #C62828;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="resources/icons/lumina_icon_L_star_page-0001.jpg" alt="" class="logo-mark">
      </a>
      <a href="index.html" style="font-size: 13px; color: var(--muted); text-decoration: none;">Voltar ao site</a>
    </div>
  </header>

  <main class="dashboard-container">
    <h1 style="font-family: var(--serif); font-size: 32px; margin-bottom: 24px;">Moderação de Artigos</h1>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Pesquisadora</th>
            <th>Título do Artigo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>10 jun. 2026</td>
            <td>Dra. Beatriz Alves</td>
            <td>Estudo Fenológico do Cerrado Brasileiro</td>
            <td>
              <button class="btn-action btn-approve"
                onclick="alert('Publicado!'); this.parentElement.parentElement.style.display='none';">Aprovar</button>
              <button class="btn-action btn-reject"
                onclick="alert('Rejeitado!'); this.parentElement.parentElement.style.display='none';">Rejeitar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>

</html>
