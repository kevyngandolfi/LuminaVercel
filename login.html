<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina — Entrar</title>
  <link rel="icon" type="image/png" href="resources\icons\lumina_icon_L_star_page-0001.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --cream: #F7F3EE; --cream-dark: #EDE7DE; --orange: #E5501E; --orange-dim: #B83E16; --black: #181614; --ink: #2B2622; --muted: #7A7168; --line: #DDD7CF; --white: #FFFFFF; --serif: 'Cormorant Garamond', serif; --sans: 'DM Sans', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--cream); color: var(--ink); line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    .site-header { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(247, 243, 238, .95); border-bottom: 1px solid var(--line); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .logo { display: flex; align-items: center; gap: 10px; font-family: var(--serif); font-size: 22px; font-weight: 500; color: var(--black); }
    .logo-mark { width: 32px; height: 32px; background: var(--orange); border-radius: 50%; position: relative; }
    .logo-mark::after { content: ''; position: absolute; inset: 6px; border: 2px solid var(--white); border-radius: 50%; }
    .login-section { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding-top: 64px; }
    .form-container { background: var(--white); border: 1px solid var(--line); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(24,22,20,0.02); }
    .form-header { margin-bottom: 32px; text-align: center; }
    .form-title { font-family: var(--serif); font-size: 32px; color: var(--black); margin-bottom: 8px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .form-label { font-size: 13px; font-weight: 500; }
    .form-input { font-family: var(--sans); font-size: 14px; background: var(--cream); border: 1px solid var(--line); border-radius: 8px; padding: 12px 16px; width: 100%; outline: none; }
    .form-input:focus { border-color: var(--orange); background: var(--white); }
    .btn-submit { width: 100%; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 500; background: var(--orange); color: var(--white); border: none; cursor: pointer; margin-bottom: 24px; }
    .form-footer { text-align: center; font-size: 14px; color: var(--muted); display: flex; flex-direction: column; gap: 12px; }
    .form-footer a { color: var(--orange); font-weight: 500; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo"><div class="logo-mark"></div>Lumina</a>
    </div>
  </header>

  <main class="login-section">
    <div class="form-container">
      <div class="form-header">
        <h1 class="form-title">Bem-vinda de volta</h1>
        <p style="font-size: 14px; color: var(--muted);">Acesse sua conta para continuar</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" id="email" class="form-input" placeholder="seu.nome@exemplo.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-input" placeholder="••••••••" required>
        </div>
        <div style="text-align: right; margin-bottom: 24px;">
          <a href="recuperar-senha.html" style="font-size: 13px; color: var(--orange); font-weight: 500;">Esqueci minha senha</a>
        </div>
        <button type="submit" class="btn-submit">Entrar</button>
        <div class="form-footer">
          <span>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></span>
          <span style="font-size: 12px; border-top: 1px solid var(--line); padding-top: 12px;">Acesso restrito: <a href="painel-admin.html" style="color: var(--muted);">Área do Administrador</a></span>
        </div>
      </form>
    </div>
  </main>

  <script>
    // Truque para o perfil Coringa!
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      let nome = email.split('@')[0];
      // Deixa a primeira letra maiúscula
      nome = nome.charAt(0).toUpperCase() + nome.slice(1);
      localStorage.setItem('lumina_userName', nome);
      window.location.href = 'painel.html';
    });
  </script>
</body>
</html>
