<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Contato — Lumina</title>
  <link rel="icon" type="image/png" href="resources\icons\lumina_icon_L_star_page-0001.jpg" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --cream: #F7F3EE;
      --orange: #E5501E;
      --black: #181614;
      --ink: #2B2622;
      --muted: #7A7168;
      --line: #DDD7CF;
      --white: #FFFFFF;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'DM Sans', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247, 243, 238, .96);
      border-bottom: 1px solid var(--line);
      padding: 0 24px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 500;
      color: var(--black);
      text-decoration: none;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: var(--orange);
      border-radius: 50%;
      position: relative;
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 5px;
      border: 2px solid var(--white);
      border-radius: 50%;
    }

    .nav {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav a {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
    }

    .container {
      max-width: 600px;
      margin: 80px auto;
      padding: 40px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    h1 {
      font-family: var(--serif);
      font-size: 36px;
      color: var(--black);
      margin-bottom: 8px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--cream);
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--orange);
      background: var(--white);
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      background: var(--orange);
      color: var(--white);
      border: none;
      cursor: pointer;
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="resources/icons/lumina_icon_L_star_page-0001.jpg" alt="" class="logo-mark">
      </a>
      <nav class="nav">
        <li><a href="pesquisa.html">Pesquisas</a></li>
        <li><a href="quem-somos.html">Quem Somos</a></li>
        <li><a href="contato.html">Contato</a></li>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Fale Conosco</h1>
    <p style="text-align: center; color: var(--muted); margin-bottom: 32px; font-size: 14px;">Dúvidas? Envie um e-mail
      para <strong>falecom@lumina.edu.br</strong> ou use o formulário.</p>
    <form onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso!');">
      <div class="form-group">
        <label>Seu Nome</label>
        <input type="text" required>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" required>
      </div>
      <div class="form-group">
        <label>Mensagem</label>
        <textarea rows="4" required></textarea>
      </div>
      <button type="submit">Enviar Mensagem</button>
    </form>
  </main>
</body>

</html>
